name: Codacy Security Scan

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '15 6 * * 4'

permissions:
  contents: read

jobs:
  codacy-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download Codacy CLI v2
        run: |
          curl -Ls https://raw.githubusercontent.com/codacy/codacy-cli-v2/main/codacy-cli.sh -o /tmp/codacy-cli.sh
          chmod +x /tmp/codacy-cli.sh

      - name: Initialize Codacy configuration
        run: |
          /tmp/codacy-cli.sh init

      - name: Install tools
        run: |
          /tmp/codacy-cli.sh install

      - name: Codacy Security Scan
        run: |
          /tmp/codacy-cli.sh analyze --format sarif -o results.sarif

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
