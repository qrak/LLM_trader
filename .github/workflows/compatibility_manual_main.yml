name: Compatibility (Manual Main)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard-main:
    name: Guard (main branch only)
    runs-on: ubuntu-latest
    steps:
      - name: Ensure workflow runs only on main
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "This workflow is intended to be run from main only."
            echo "Current ref: ${GITHUB_REF}"
            exit 1
          fi

  linux-full:
    name: Linux full tests
    runs-on: ubuntu-latest
    needs: guard-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run full test suite
        run: pytest tests/

  windows-medium:
    name: Windows medium checks
    runs-on: windows-latest
    needs: guard-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt

      - name: Install lightweight tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Static lint and syntax compile checks
        run: |
          ruff check src tests start.py
          python -m compileall -q src start.py tests

  macos-smoke:
    name: macOS smoke checks
    runs-on: macos-latest
    needs: guard-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Smoke syntax checks
        run: |
          python -m compileall -q src start.py
